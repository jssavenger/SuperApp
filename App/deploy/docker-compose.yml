services:
  super_app:
    container_name: super_app_container
    build:
      context: ../..
      dockerfile: app/deploy/Dockerfile
    ports:
      - "5544:8000"
    volumes:
      - ../..:/app

  db:
    image: postgres:latest
    container_name: super_app_database
    ports:
      - "5438:5432"
    env_file:
      - ../../.env
    restart: always